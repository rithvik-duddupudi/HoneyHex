# Publish wheels/sdist to PyPI when you push a version tag: git tag v0.1.1 && git push origin v0.1.1
#
# Publishing options (pick one):
#
# A) API token (simplest to start)
#    1. PyPI → Account settings → API tokens → Create (scope to project "honeyhex").
#    2. GitHub repo → Settings → Secrets and variables → Actions → New repository secret:
#       Name:  PYPI_API_TOKEN
#       Value: pypi-AgEI...   (the token string)
#    3. Do NOT commit the token; it only lives in GitHub Secrets.
#
# B) Trusted publishing (no long-lived token in GitHub)
#    PyPI → Project → Settings → Publishing → Add pending publisher → link this repo + publish.yml.
#    Leave PYPI_API_TOKEN unset; the workflow uses OIDC (id-token permission below).
#
# Before any release: bump version in pyproject.toml, then tag: git tag v0.1.1 && git push origin v0.1.1

name: Publish to PyPI

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build
        run: python -m pip install --upgrade build

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # If set in repo Secrets, uploads with the token. If empty, uses trusted publishing (OIDC).
          password: ${{ secrets.PYPI_API_TOKEN }}
