# Publish wheels/sdist to PyPI when you push a version tag: git tag v0.1.1 && git push origin v0.1.1
#
# One-time PyPI setup (trusted publishing — no API token in GitHub secrets):
# 1. Create the "honeyhex" project on PyPI (or your chosen name).
# 2. PyPI → Project → Settings → Publishing → Add pending publisher:
#    - Owner: your GitHub user or org
#    - Repository: HoneyHex (or repo name)
#    - Workflow: publish.yml
#    - Environment: (leave empty) or create "release" and match below
# 3. Ensure the tag matches pyproject.toml version before tagging.

name: Publish to PyPI

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build
        run: python -m pip install --upgrade build

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # With trusted publishing, no secrets needed. For token-based upload instead,
        # add PYPI_API_TOKEN to repo secrets and pass: with: password: ${{ secrets.PYPI_API_TOKEN }}
