# Composite: install HoneyHex and run `hex validate` in a checked-out repo.
# Usage (caller must run actions/checkout first):
#   - uses: ./.github/actions/hex-validate
#     with:
#       working-directory: .
#       package-spec: honeyhex
name: HoneyHex validate
description: Install HoneyHex from PyPI (or another pip spec) and run hex validate
inputs:
  python-version:
    description: Python version for setup-python
    default: "3.12"
  working-directory:
    description: Directory containing the HoneyHex cell (agent project root)
    default: "."
  package-spec:
    description: pip install target (e.g. honeyhex or -e .)
    default: honeyhex
runs:
  using: composite
  steps:
    - uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install HoneyHex
      shell: bash
      run: python -m pip install --upgrade pip && pip install "${{ inputs.package-spec }}"

    - name: hex validate
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: hex validate
